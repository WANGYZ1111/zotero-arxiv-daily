name: Test

# 仅保留手动触发（方便测试）
on:
  workflow_dispatch:

jobs:
  calculate-and-send:
    runs-on: ubuntu-latest
    # 全局环境变量（所有步骤共享，开启完整错误日志）
    env:
      DEBUG: "true"
      HYDRA_FULL_ERROR: "1"

    steps:
      # 1. 拉取当前仓库代码（注释掉的仓库/分支配置已保留）
      - name: Checkout Code
        uses: actions/checkout@v6
        # 如需拉取指定仓库/分支，取消下面注释并配置 Repository variables
        # with:
        #   repository: ${{ vars.REPOSITORY }}
        #   ref: ${{ vars.REF }}

      # 2. 安装 uv（指定版本，保持稳定）
      - name: Setup UV
        uses: astral-sh/setup-uv@v7.1.4
        with:
          uv-version: "latest"  # 锁定 uv 版本，避免兼容性问题

      # 3. 前置准备：创建 config 目录 + 生成配置文件（核心修复）
      - name: Prepare Custom Config
        run: |
          # 关键：先创建 config 目录，避免「No such file or directory」错误
          mkdir -p config
          
          # 生成配置文件（优先使用 CUSTOM_CONFIG 变量，为空则用默认完整配置）
          if [ -n "$CUSTOM_CONFIG" ]; then
            printf "%b\n" "$CUSTOM_CONFIG" > config/custom.yaml
          else
            # 兜底：生成包含所有必填项的默认配置（避免 executor.source 缺失）
            cat > config/custom.yaml << EOF
          email:
            sender: ${SENDER}
            receiver: ${RECEIVER}
            smtp_server: smtp.163.com
            smtp_port: 465
            sender_password: ${SENDER_PASSWORD}

          llm:
            api:
              key: ${OPENAI_API_KEY}
              base_url: ${OPENAI_API_BASE}
            generation_kwargs:
              model: gpt-4o-mini

          source:
            arxiv:
              category: ["cs.AI","cs.CV","cs.LG","eess.SP","eess.IV"]
              include_cross_list: true

          executor:
            debug: ${DEBUG}
            source: ['arxiv']

          zotero:
            user_id: ${ZOTERO_ID}
            api_key: ${ZOTERO_KEY}
            include_path: null
          EOF
          fi

          # 打印配置文件内容，确认正确性
          echo "=== Final Custom Config ==="
          cat config/custom.yaml
          echo "==========================="
        env:
          # 注入密钥到配置生成步骤
          SENDER: ${{ secrets.SENDER }}
          RECEIVER: ${{ secrets.RECEIVER }}
          SENDER_PASSWORD: ${{ secrets.SENDER_PASSWORD }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_API_BASE: ${{ secrets.OPENAI_API_BASE }}
          ZOTERO_ID: ${{ secrets.ZOTERO_ID }}
          ZOTERO_KEY: ${{ secrets.ZOTERO_KEY }}

      # 4. 运行主脚本（显式指定配置文件，避免 Hydra 加载错误）
      - name: Run Main Script
        run: |
          # 安装项目依赖（确保依赖完整）
          uv sync --frozen
          # 显式指定配置文件路径，强制 Hydra 加载我们生成的 custom.yaml
          uv run python src/zotero_arxiv_daily/main.py \
            --config-path ./config \
            --config-name custom \
            hydra.job.chdir=true
        env:
          # 运行时兜底注入所有密钥
          ZOTERO_ID: ${{ secrets.ZOTERO_ID }}
          ZOTERO_KEY: ${{ secrets.ZOTERO_KEY }}
          SENDER: ${{ secrets.SENDER }}
          RECEIVER: ${{ secrets.RECEIVER }}
          SENDER_PASSWORD: ${{ secrets.SENDER_PASSWORD }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_API_BASE: ${{ secrets.OPENAI_API_BASE }}

      # 5. （可选）上传调试文件，失败时可下载分析
      - name: Upload Debug Artifacts
        if: always()  # 无论成功/失败都执行
        uses: actions/upload-artifact@v4
        with:
          name: test-debug-files
          path: |
            config/custom.yaml
            .hydra/
            *.log
